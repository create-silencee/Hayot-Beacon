<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hayot Beacon — Вход в систему</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.2);
            --radius: 24px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            color: white;
        }

        .auth-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 40px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h2 { text-align: center; font-weight: 600; margin-bottom: 30px; }

        .input-group { margin-bottom: 20px; }

        label { display: block; margin-bottom: 8px; font-size: 14px; opacity: 0.8; }

        input {
            width: 100%;
            padding: 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            font-family: inherit;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: #38bdf8; background: rgba(255, 255, 255, 0.1); }

        .btn {
            width: 100%;
            padding: 14px;
            background: #38bdf8;
            border: none;
            border-radius: 12px;
            color: #0f172a;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn:hover { background: #7dd3fc; transform: translateY(-2px); }

        .hint { font-size: 12px; margin-top: 8px; color: #94a3b8; line-height: 1.4; }

        .toggle-text {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            opacity: 0.7;
            cursor: pointer;
        }

        .toggle-text b { color: #38bdf8; }
    </style>
</head>
<body>

<div class="auth-card" id="authCard">
    <h2 id="title">Вход</h2>
    
    <div class="input-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="name@example.com" required>
    </div>

    <div class="input-group">
        <label>Пароль</label>
        <input type="password" id="password" placeholder="••••••••" required>
        <div id="passwordHint" class="hint" style="display: none;">
            Минимум 8 символов: заглавная буква, строчная и цифра.
        </div>
    </div>

    <button class="btn" onclick="validateAndSubmit()">Продолжить</button>

    <div class="toggle-text" onclick="toggleAuth()">
        Нет аккаунта? <b>Создать</b>
    </div>
</div>

<script>
    let isLogin = true;

    function toggleAuth() {
        isLogin = !isLogin;
        document.getElementById('title').innerText = isLogin ? 'Вход' : 'Регистрация';
        document.getElementById('passwordHint').style.display = isLogin ? 'none' : 'block';
        document.querySelector('.toggle-text').innerHTML = isLogin ? 
            'Нет аккаунта? <b>Создать</b>' : 'Уже есть аккаунт? <b>Войти</b>';
    }

    function validateAndSubmit() {
        const pass = document.getElementById('password').value;
        const email = document.getElementById('email').value;

        // Регулярное выражение для защиты пароля
        const passRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$/;

        if (!email.includes('@')) {
            alert('Введите корректный Email');
            return;
        }

        if (!isLogin && !passRegex.test(pass)) {
            alert('Пароль слишком слабый! Проверьте требования безопасности.');
            return;
        }

        alert(isLogin ? 'Вход выполнен!' : 'Регистрация успешна! Теперь вы в системе Hayot.');
        // Здесь будет переход на главную страницу с SOS кнопкой
    }
</script>

</body>
</html>
