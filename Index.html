<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hayot Beacon — Безопасность</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" id="authScreen">
        <h2>Hayot Beacon</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Пароль">
        <button class="btn btn-main" onclick="handleAuth()">Продолжить</button>
        <p class="toggle-text" onclick="toggleAuthMode()">Нет аккаунта? <b>Создать</b></p>
    </div>

    <div class="container hidden" id="mainScreen">
        <div class="status-badge">СИСТЕМА АКТИВНА</div>
        <button class="sos-btn" onclick="sendSOS()">SOS</button>
        <div class="action-grid">
            <button class="btn btn-secondary" onclick="alert('Медпункты Андижана...')">🏥 Помощь</button>
            <button class="btn btn-secondary" onclick="toggleVolunteer()">🙋‍♂️ Волонтер</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
